{% extends "base.html" %} {% block content %}
<div
  style="
    max-width: 500px;
    margin: 40px auto;
    padding: 30px;
    background: white;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
  "
>
  <h2>📖 Borrow a Book</h2>
  <form method="POST">
    {% csrf_token %}
    <div style="margin-bottom: 20px">
      <label style="display: block; margin-bottom: 8px; font-weight: bold"
        >Select Book:</label
      >
      <select
        name="book_id"
        required
        style="
          width: 100%;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      >
        {% for book in books %} {% if book.count > 0 %}
        <option value="{{ book.id }}">
          {{ book.name }} (Available: {{ book.count }})
        </option>
        {% endif %} {% endfor %}
      </select>
    </div>

    <p style="font-size: 0.9em; color: #666; margin-bottom: 20px">
      * The book is issued for 14 days by default.
    </p>

    <button
      type="submit"
      style="
        width: 100%;
        padding: 12px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: bold;
        cursor: pointer;
      "
    >
      Confirm Order
    </button>
  </form>
</div>
{% endblock %}

{% extends "base.html" %} {% block content %}

<h2>Users List</h2>

<table>
  <tr>
    <th>ID</th>
    <th>Email</th>
    <th>Role</th>
    <th>Action</th>
  </tr>

  {% for user in users %}
  <tr>
    <td>{{ user.id }}</td>
    <td>{{ user.email }}</td>
    <td>{{ user.get_role_name }}</td>
    <td>
      <a href="{% url 'user_detail' user.id %}">View</a>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
